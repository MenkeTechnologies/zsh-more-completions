name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # false: rapid pushes queue; the previous run finishes instead of being cancelled mid-suite
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        zsh-version: ['default']
      fail-fast: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: zsh-more-completions

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh vim python3 curl git

      - name: Set terminal size variables
        run: |
          echo "TERM=xterm" >> "$GITHUB_ENV"
          echo "COLUMNS=120" >> "$GITHUB_ENV"
          echo "LINES=40" >> "$GITHUB_ENV"

      - name: Set up zunit
        run: |
          set -euo pipefail
          mkdir -p .bin
          curl -fsSL -o .bin/revolver https://raw.githubusercontent.com/molovo/revolver/master/revolver
          chmod u+x .bin/revolver
          export PATH="$PWD/.bin:$PATH"
          git clone --depth 1 https://github.com/MenkeTechnologies/zunit
          (cd zunit && ./build.zsh)
          echo "$PWD/zunit" >> "$GITHUB_PATH"
          echo "$PWD/.bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: |
          set -euo pipefail
          cd zsh-more-completions
          zunit --verbose tests/*.zsh

  docs-gates:
    name: Docs gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-target-blank-rel-noopener.sh
      - run: bash tests/docs-no-http-links.sh
      - run: bash tests/docs-no-inline-handlers.sh

  polish-gates:
    name: Polish gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/man-page-no-trailing-whitespace.sh
      - run: bash tests/man-page-final-newline.sh
      - run: bash tests/man-page-synopsis-section.sh
      - run: bash tests/tests-shell-executable.sh
      - run: bash tests/tests-shell-shebang.sh

  semantic-gates:
    name: Semantic gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-has-h1.sh
      - run: bash tests/docs-no-deprecated-tags.sh
      - run: bash tests/docs-no-placeholder-href.sh

  newline-gates:
    name: Newline + README gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/readme-final-newline.sh
      - run: bash tests/docs-final-newline.sh
      - run: bash tests/workflow-final-newline.sh
      - run: bash tests/cargo-final-newline.sh
      - run: bash tests/readme-has-https-link.sh
