#compdef update-exim4.conf

local arguments

arguments=(
    '--check[Generate temporary configuration file, check its validity and exit]'
    {-d,--confdir}'[Read input from directory instead of /etc/exim4]:directory:_directories'
    {-h,--help}'[Show short help message and exit]'
    '--keepcomments[Do not remove comment lines from the output file]'
    {-o,--output}'[Write output to file instead of /var/lib/exim4/config.autogenerated]:file:_files'
    '--removecomments[Remove comment lines from the output file (default)]'
    {-v,--verbose}'[Enable verbose mode]'
    '*:filename:_files'
)
_arguments -s $arguments
